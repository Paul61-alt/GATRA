name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RADAR/radar/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: RADAR/radar/backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check . --exclude .venv

      - name: Import smoke test
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          import models.company, models.competitor, models.pipeline, models.radar_output
          import pipeline.transform, pipeline.synthesize
          import utils.dedup
          print('All imports OK')
          "
        env:
          LINKUP_API_KEY: "ci-placeholder"
          ANTHROPIC_API_KEY: "ci-placeholder"
