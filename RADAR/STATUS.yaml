      path: radar/backend/pipeline/enrich.py
      status: "✅ Codé, dans la cible"
      last_bench_s: "17–22s sur 4 domains"
      target_s: 60
    main_api:
      path: radar/backend/main.py
      status: "✅ FastAPI routes + CORS + rate limit + kill switch + cache"
    linkup_client:
      path: radar/backend/clients/linkup_client.py
      status: "✅ Wrapper search + fetch + tasks (batch async) + retry/fallback"
