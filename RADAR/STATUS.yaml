      path: radar/frontend/src/types/index.ts
      status: "⚠️ Mirrors manuels des modèles Pydantic — drift risk"

  evals:
    paths:
      - radar/backend/evals/eval_understand.py
      - radar/backend/evals/eval_discover.py
      - radar/backend/evals/eval_enrich.py
      - radar/backend/evals/probe_understand.py
