      path: radar/frontend/src/pages/index.tsx
      status: "✅ Form URL + state management + API call"
      tested_e2e: false
    components:
      paths:
        - radar/frontend/src/components/CompanyCard.tsx
        - radar/frontend/src/components/landing/
        - radar/frontend/src/components/loading/OperationsConsole.tsx
