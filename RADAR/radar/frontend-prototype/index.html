<div id="root"></div>

<script>
// Tweaks defaults — host can rewrite this block
window.RADAR_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "accent": "#b34a1f",
  "showSubjectAccent": true,
  "overviewVersion": "v1"
}/*EDITMODE-END*/;

// Populated after a real scan; starts empty so the app boots into Home/New scan
window.RADAR_DATA = null;

// Backend URL — Render-hosted prod backend (change to localhost:8000 for local dev)
window.RADAR_API = "https://radar-backend-je6o.onrender.com";

// ─── Bearer token auth helpers (shared secret, gates /scan* endpoints) ────────
window.RADAR_TOKEN_KEY = "radar:token";

window.radarGetToken = function () {
  try { return localStorage.getItem(window.RADAR_TOKEN_KEY) || ""; } catch { return ""; }
};
window.radarSetToken = function (t) {
  try { localStorage.setItem(window.RADAR_TOKEN_KEY, t || ""); } catch {}
};
window.radarClearToken = function () {
  try { localStorage.removeItem(window.RADAR_TOKEN_KEY); } catch {}
};

// ─── BYOK: tester's own LinkUp key (gates access + pays for their own scans) ───
window.RADAR_LINKUP_KEY_KEY = "radar:linkupKey";

window.radarGetLinkupKey = function () {
  try { return localStorage.getItem(window.RADAR_LINKUP_KEY_KEY) || ""; } catch { return ""; }
};
window.radarSetLinkupKey = function (k) {
  try { localStorage.setItem(window.RADAR_LINKUP_KEY_KEY, k || ""); } catch {}
};
window.radarClearLinkupKey = function () {
  try { localStorage.removeItem(window.RADAR_LINKUP_KEY_KEY); } catch {}
};

// Monkey-patch fetch so every call to window.RADAR_API auto-attaches the bearer
// token AND the BYOK LinkUp key. Zero changes needed at fetch sites in
// app.jsx / screens-*.jsx — discover, enrich, memo, status, scans, SSE all inherit.
(function () {
  const _origFetch = window.fetch;
  window.fetch = function (input, init) {
    init = init || {};
    const url = typeof input === "string" ? input : (input && input.url) || "";
    if (window.RADAR_API && url.startsWith(window.RADAR_API)) {
      const headers = Object.assign({}, init.headers || {});
      const token = window.radarGetToken();
      if (token) headers["Authorization"] = "Bearer " + token;
      const linkupKey = window.radarGetLinkupKey();
      if (linkupKey) headers["X-Linkup-Key"] = linkupKey;
      init.headers = headers;
    }
    return _origFetch(input, init);
  };
})();
</script>
